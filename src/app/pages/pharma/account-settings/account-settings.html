<div class="table-container">
    <table mat-table [dataSource]="dataSource" class="mat-elevation-z8">
        <ng-container matColumnDef="id">
            <th mat-header-cell *matHeaderCellDef> Id </th>
            <td mat-cell *matCellDef="let row"> {{row.id}} </td>
        </ng-container>

        <ng-container matColumnDef="deviceId">
            <th mat-header-cell *matHeaderCellDef> Device&nbsp;Id </th>
            <td mat-cell *matCellDef="let row"> {{row.deviceId}} </td>
        </ng-container>

        <ng-container matColumnDef="fcmToken">
            <th mat-header-cell *matHeaderCellDef> FCM&nbsp;Name </th>
            <td mat-cell *matCellDef="let row" matTooltip="row.fcmToken"> {{row.fcmToken}} </td>
        </ng-container>

        <ng-container matColumnDef="deviceType">
            <th mat-header-cell *matHeaderCellDef> Device&nbsp;Type </th>
            <td mat-cell *matCellDef="let row"> {{row.deviceType}} </td>
        </ng-container>

        <ng-container matColumnDef="adminId">
            <th mat-header-cell *matHeaderCellDef> Admin&nbsp;Id </th>
            <td mat-cell *matCellDef="let row"> {{row.adminId}} </td>
        </ng-container>

        <ng-container matColumnDef="actions">
            <th mat-header-cell *matHeaderCellDef> Allow Notifications </th>
            <td mat-cell *matCellDef="let row">
                <mat-button-toggle-group [(ngModel)]="row.isPrimary" (change)="updateFCM(row)">
                    <mat-button-toggle [value]="true">Yes</mat-button-toggle>
                    <mat-button-toggle [value]="false">No</mat-button-toggle>
                </mat-button-toggle-group>
            </td>
        </ng-container>
        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
    </table>
</div>
