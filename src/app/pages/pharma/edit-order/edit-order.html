<div class="edit-container p-0">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h4 class="mb-1">Edit Order Items</h4>
            <p class="text-muted small">Adjust quantities based on availability. Cannot exceed original demand.</p>
        </div>
        <button mat-flat-button color="primary" (click)="saveChanges()">
            <mat-icon>check</mat-icon> Confirm Updates
        </button>
    </div>

    <div class="mat-elevation-z2 rounded-3 overflow-hidden">
        <table mat-table [dataSource]="editDataSource" class="w-100 edit-table">

            <ng-container matColumnDef="product">
                <th mat-header-cell *matHeaderCellDef> Product </th>
                <td mat-cell *matCellDef="let item">
                    <div class="fw-bold"> {{item.productName}}</div>
                    <span class="text-primary small">ORD Id# {{item.productId}}</span>
                </td>
            </ng-container>

            <ng-container matColumnDef="quantity">
                <th mat-header-cell *matHeaderCellDef style="width: 200px;"> Quantity </th>
                <td mat-cell *matCellDef="let item">
                    <div class="d-flex align-items-center">
                        <button mat-icon-button (click)="onQtyChange(item, item.quantity - 1)">
                            <mat-icon>remove_circle_outline</mat-icon>
                        </button>
                        <span class="px-3">{{item.quantity}}</span>
                        <button mat-icon-button color="primary" [disabled]="item.quantity >= item.allowedQty"
                            (click)="onQtyChange(item, item.quantity + 1)">
                            <mat-icon>add_circle_outline</mat-icon>
                        </button>
                    </div>
                </td>
            </ng-container>

            <ng-container matColumnDef="availability">
                <th mat-header-cell *matHeaderCellDef> Status </th>
                <td mat-cell *matCellDef="let item">

                    <div class="status-display d-flex align-items-center" [ngClass]="{
           'text-success': item.availabilityStatus === 'AVAILABLE',
           'text-danger': item.availabilityStatus === 'NOT_AVAILABLE',
           'text-warning': item.availabilityStatus === 'PARTIAL_AVAILABLE'
         }">
                        <mat-icon *ngIf="item.availabilityStatus === 'AVAILABLE'">
                            check_circle
                        </mat-icon>
                        <mat-icon *ngIf="item.availabilityStatus === 'NOT_AVAILABLE'">
                            cancel
                        </mat-icon>
                        <mat-icon *ngIf="item.availabilityStatus === 'PARTIAL_AVAILABLE'">
                            remove_circle
                        </mat-icon>
                        {{ item.availabilityStatus | titlecase}}
                    </div>
                </td>
            </ng-container>
            <tr mat-header-row *matHeaderRowDef="['product', 'quantity', 'availability']"></tr>
            <tr mat-row *matRowDef="let row; columns: ['product', 'quantity', 'availability']"></tr>
        </table>
    </div>
</div>
