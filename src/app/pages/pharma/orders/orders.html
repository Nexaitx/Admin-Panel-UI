<div class="order-container">

  <!-- Status Filter -->
  <div class="d-flex justify-content-between align-items-center mb-3">

    <mat-form-field appearance="outline" class="w-25">
      <mat-label>Status</mat-label>
      <mat-select [(value)]="selectedStatus" (selectionChange)="fetchBookings()">
        <mat-option value="ACCEPTED">Accepted</mat-option>
        <mat-option value="DELIVERED">Delivered</mat-option>
        <mat-option value="MISSED">Missed</mat-option>
        <mat-option value="REJECTED">Rejected</mat-option>
      </mat-select>
    </mat-form-field>

    <button matButton (click)="printOrder()">
      <mat-icon>print</mat-icon>
      <span>Print</span>
    </button>

  </div>

  <!-- Table -->
  <div class="mat-elevation-z1 rounded overflow-hidden">
    <table mat-table [dataSource]="dataSource" class="w-100">

      <!-- Order ID -->
      <ng-container matColumnDef="orderId">
        <th mat-header-cell *matHeaderCellDef> Order&nbsp;ID </th>
        <td mat-cell *matCellDef="let element" class="fw-bold">
          #{{element.bookingId}}
        </td>
      </ng-container>

      <!-- Customer -->
      <ng-container matColumnDef="customer">
        <th mat-header-cell *matHeaderCellDef> User&nbsp;Address&nbsp;Details </th>
        <td mat-cell *matCellDef="let element">
          {{element.userAddressDetails}}
        </td>
      </ng-container>

      <!-- Medication -->
      <ng-container matColumnDef="distance">
        <th mat-header-cell *matHeaderCellDef> Distance in Km </th>
        <td mat-cell *matCellDef="let element">
          {{element.distanceKm}}
        </td>
      </ng-container>

      <!-- Amount -->
      <ng-container matColumnDef="amount">
        <th mat-header-cell *matHeaderCellDef> TotalAmount </th>
        <td mat-cell *matCellDef="let element">
          {{element.totalAmount | currency:'INR'}}
        </td>
      </ng-container>

      <!-- Date -->
      <ng-container matColumnDef="status">
        <th mat-header-cell *matHeaderCellDef> Status </th>
        <td mat-cell *matCellDef="let element">
          {{element.status}}
        </td>
      </ng-container>

      <!-- Actions -->
      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef>Actions</th>

        <td mat-cell *matCellDef="let element" class="text-end">

          <!-- 3 Dot Menu Button -->
          <button mat-icon-button [matMenuTriggerFor]="actionMenu">
            <mat-icon>more_vert</mat-icon>
          </button>

          <!-- Menu -->
          <mat-menu #actionMenu="matMenu">
            <button mat-menu-item (click)="viewOrder(element)">
              <mat-icon>visibility</mat-icon>
              <span>View</span>
            </button>


          </mat-menu>

        </td>
      </ng-container>

      <!-- Header -->
      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>

      <!-- Rows -->
      <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>

      <!-- No Data -->
      <tr class="mat-row" *matNoDataRow>
        <td class="mat-cell text-center p-5" colspan="6">
          No bookings found.
        </td>
      </tr>

    </table>
  </div>

</div>
